# Netlify deploy config — ADR-003 (Netlify hosting)
[build]
  # @co-5 — lhci run after build asserts LCP < 2.5s and TTI < 3.5s
  command   = "npm run build && npx lhci autorun"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Deploy previews for every PR — @co-5 (performance review before merge)
[context.deploy-preview]
  command = "npm run build"
